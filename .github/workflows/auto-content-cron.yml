name: Auto Content Generator (All Games)

on:
  schedule:
    # Run every day at 16:05 UTC (Midnight Sydney time)
    - cron: '5 16 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Content Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run generate:all

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/connections/ src/content/pips/ src/content/wordle/ src/content/strands/
          
          # Only commit if there are changes
          git diff --staged --quiet || (git commit -m "Auto-generate daily game hints" && git push)

      - name: Trigger Google Indexing API
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY_JSON }}
        run: node scripts/google-indexing-trigger.js
